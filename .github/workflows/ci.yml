name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, typecheck, test, build (both apps)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        # Bug CI fix (mai/2026): substituido pnpm/action-setup por
        # corepack (built-in do Node) — elimina dependencia externa que
        # ficou quebrada quando v4 do pnpm/action-setup foi force-pushed
        # e o SHA cacheado (b906affc) foi GC'd do codeload.github.com.
        # Esta abordagem (corepack) é mais robusta porque nao depende
        # de SHA externo sujeito a force-push.
        # Alternativa avaliada: pnpm/action-setup@<SHA full> v6.0.8.
        # Optamos por corepack porque elimina o vetor de problema na raiz.
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint CRM
        run: pnpm --filter @persia/crm lint
        # NOTE: admin tem 77 lint errors pre-existentes. Habilitar na Fase 2.2
        # quando extrair shared lib e atacar admin technical debt.

      - name: Typecheck CRM
        run: pnpm --filter @persia/crm typecheck
        # NOTE: admin has no typecheck script — 234 pre-existing type errors
        # (ignoreBuildErrors:true em next.config). Resolver na Fase 2.2 quando
        # extrair shared types.

      - name: Test CRM
        run: pnpm --filter @persia/crm test

      - name: Build CRM
        env:
          SUPABASE_SERVICE_ROLE_KEY: ci-dummy
          ADMIN_CONTEXT_SECRET: ci-dummy-admin-secret
          CRM_API_SECRET: ci-dummy
          CRON_SECRET: ci-dummy
          NEXT_PUBLIC_PERSIA_WHATSAPP: "5511000000000"
        run: pnpm --filter @persia/crm build

      - name: Build Admin
        env:
          SUPABASE_SERVICE_ROLE_KEY: ci-dummy
          ADMIN_CONTEXT_SECRET: ci-dummy-admin-secret
          NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon
        run: pnpm --filter @persia/admin build
